<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GURA TOON | Premium Webtoon Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+KR:wght@300;400;700;900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #8B5CF6; --bg: #0A0A0C; }
        body { background-color: var(--bg); color: #fff; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        
        /* 텍스트 그라데이션 */
        .text-gradient { background: linear-gradient(135deg, #fff 30%, #8B5CF6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 카드 유리효과 */
        .toon-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toon-card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2); }

        /* 애니메이션 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.8s ease forwards; }

        /* 커스텀 스크롤바 숨기기 (모바일 감성) */
        ::-webkit-scrollbar { width: 0; }
        
        /* 히어로 섹션 블러 배경 */
        .hero-blur {
            position: absolute; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            filter: blur(80px); z-index: -1;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-black/50 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="font-orbitron text-xl tracking-tighter font-black">GURA<span class="text-purple-500">TOON</span></h1>
            <div class="flex items-center gap-4">
                <span id="dbStatus" class="w-2 h-2 rounded-full bg-gray-600"></span>
                <button class="text-xs font-bold tracking-widest text-gray-400 hover:text-white transition-colors uppercase">Archive</button>
            </div>
        </div>
    </nav>

    <header class="relative pt-32 pb-16 px-6 max-w-5xl mx-auto overflow-hidden">
        <div class="hero-blur"></div>
        <div class="hero-blur" style="top: 20%; left: 60%; background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);"></div>
        
        <div class="fade-in">
            <span class="inline-block px-3 py-1 rounded-full bg-purple-500/10 text-purple-400 text-[10px] font-black tracking-[0.2em] mb-4 border border-purple-500/20">AI-GENERATED STUDIO</span>
            <h2 class="text-4xl md:text-6xl font-black leading-[1.1] mb-6 text-gradient italic">
                구라가 날리는<br>시원한 팩트폭격
            </h2>
            <p class="text-gray-400 text-sm md:text-base font-light leading-relaxed max-w-md">
                매일 새롭게 업데이트되는 독설의 향연. <br>
                김구라 AI가 직접 그린 최신 에피소드를 감상하세요.
            </p>
        </div>
    </header>

    <main id="feed" class="max-w-2xl mx-auto px-6 pb-32 space-y-12 md:space-y-20">
        <div class="toon-card animate-pulse">
            <div class="aspect-[4/5] bg-white/5"></div>
            <div class="p-8 space-y-4">
                <div class="h-8 bg-white/5 w-2/3 rounded-lg"></div>
                <div class="h-4 bg-white/5 w-full rounded-lg"></div>
            </div>
        </div>

        </main>

    <div class="fixed bottom-8 right-6 z-[60] flex flex-col items-end gap-4">
        <div id="miniProgress" class="hidden w-48 p-3 glass rounded-2xl border border-white/10 shadow-2xl mb-2 animate-bounce">
            <div class="flex justify-between text-[10px] font-bold mb-1">
                <span id="pText">GENERATING...</span>
                <span id="pPerc">0%</span>
            </div>
            <div class="h-1 bg-white/10 rounded-full overflow-hidden">
                <div id="pBar" class="h-full bg-purple-500 transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <button id="fab" class="w-16 h-16 rounded-full bg-purple-600 shadow-[0_0_30px_rgba(139,92,246,0.5)] flex items-center justify-center text-white active:scale-90 transition-all group overflow-hidden relative">
            <div class="absolute inset-0 bg-gradient-to-tr from-purple-600 to-indigo-600"></div>
            <svg class="relative z-10 group-hover:rotate-12 transition-transform" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
        </button>
    </div>

    <script>
        const SB_URL = "https://auhaxohbsnttmryesffe.supabase.co";
        const SB_KEY = "sb_publishable_wddiMfFQV6WeD0kpwl6n_w__Vrtx7Rl";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const UI = {
            feed: document.getElementById('feed'),
            fab: document.getElementById('fab'),
            pBar: document.getElementById('pBar'),
            pCont: document.getElementById('miniProgress'),
            pPerc: document.getElementById('pPerc'),
            pText: document.getElementById('pText'),
            dbStatus: document.getElementById('dbStatus')
        };

        // 방문자를 위한 카드 렌더링 (디자이너 퀄리티)
        function createCard(project, url, isNew = false) {
            const card = document.createElement('article');
            card.className = `toon-card ${isNew ? 'fade-in' : ''}`;
            card.innerHTML = `
                <div class="relative overflow-hidden group">
                    <img src="${url}" class="w-full aspect-[4/5] object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0A0A0C] via-transparent to-transparent opacity-90"></div>
                </div>
                <div class="p-8 md:p-10">
                    <div class="flex items-center gap-3 mb-6">
                        <span class="w-8 h-8 rounded-full bg-purple-500/20 flex items-center justify-center text-[10px] font-bold text-purple-400 border border-purple-500/30">AI</span>
                        <time class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Episode ${Math.floor(Math.random()*100)}</time>
                    </div>
                    <h3 class="text-2xl md:text-3xl font-black mb-6 leading-tight italic tracking-tighter">
                        ${project.title}
                    </h3>
                    <div class="relative pl-6">
                        <div class="absolute left-0 top-0 w-1 h-full bg-gradient-to-b from-purple-500 to-transparent"></div>
                        <p class="text-gray-400 text-lg leading-relaxed italic font-light font-serif">
                            "${project.content}"
                        </p>
                    </div>
                </div>
            `;
            return card;
        }

        // 초기 데이터 로드 (DB에서 가져오기)
        async function loadEpisodes() {
            UI.feed.innerHTML = ''; // 스켈레톤 제거
            const { data, error } = await _supabase.from('episodes').select('*').order('created_at', { ascending: false });
            
            if (data && data.length > 0) {
                data.forEach(item => {
                    const card = createCard({ title: item.title, content: item.content }, item.image_url);
                    UI.feed.appendChild(card);
                });
            } else {
                UI.feed.innerHTML = '<p class="text-center text-gray-600 py-20">아직 등록된 에피소드가 없습니다.</p>';
            }
        }

        // 새 에피소드 제작 프로세스 (진행률 UI 포함)
        async function generateNew() {
            UI.fab.disabled = true;
            UI.pCont.classList.remove('hidden');
            
            // 1. 스토리 생성 단계
            updateProgress(20, "STORYING");
            await new Promise(r => setTimeout(r, 1500));
            
            // 2. 이미지 생성 단계
            updateProgress(60, "DRAWING");
            await new Promise(r => setTimeout(r, 2500));
            
            const mock = {
                title: "코인 중독자의 최후",
                content: "야, 층수 낮아졌다고 좋아하지 마. 너 그러다 지하 뚫고 내핵까지 구경한다니까?",
                url: "https://picsum.photos/seed/" + Date.now() + "/800/1000"
            };

            // 3. DB 저장 및 렌더링
            updateProgress(100, "DONE");
            const newCard = createCard(mock, mock.url, true);
            UI.feed.prepend(newCard); // 최신글 맨 위로!
            
            setTimeout(() => {
                UI.pCont.classList.add('hidden');
                UI.fab.disabled = false;
                window.scrollTo({ top: newCard.offsetTop - 100, behavior: 'smooth' });
            }, 1000);
        }

        function updateProgress(val, text) {
            UI.pBar.style.width = val + '%';
            UI.pPerc.innerText = val + '%';
            UI.pText.innerText = text;
        }

        UI.fab.addEventListener('click', generateNew);

        window.onload = () => {
            loadEpisodes();
            // DB 연결 확인
            _supabase.from('episodes').select('id', { count: 'exact', head: true })
                .then(({error}) => {
                    if(!error) UI.dbStatus.classList.replace('bg-gray-600', 'bg-emerald-500');
                });
        };
    </script>
</body>
</html>
