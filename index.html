<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GURA TOON | Premium Webtoon Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Orbitron:wght@900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #8B5CF6; --bg: #050507; }
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }
        
        /* 텍스트 그라데이션 및 타이포 */
        .text-gradient { 
            background: linear-gradient(135deg, #fff 40%, #A78BFA 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .font-serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }

        /* 프리미엄 카드 디자인 */
        .toon-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.4s;
        }
        @media (hover: hover) {
            .toon-card:hover { 
                transform: translateY(-8px); 
                border-color: rgba(139, 92, 246, 0.3);
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            }
        }

        /* 애니메이션 */
        .reveal { animation: reveal 1s cubic-bezier(0.19, 1, 0.22, 1) forwards; }
        @keyframes reveal { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* 배경 조명 효과 */
        .bg-glow {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% -20%, rgba(139, 92, 246, 0.12) 0%, transparent 50%);
            z-index: -1; pointer-events: none;
        }
        
        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav class="fixed top-0 w-full z-50 bg-[#050507]/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="font-orbitron text-lg tracking-widest font-black italic">GURA<span class="text-purple-500">TOON</span></h1>
            <div class="flex items-center gap-6">
                <div id="liveIndicator" class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-emerald-500/80 tracking-widest uppercase">Live Feed</span>
                </div>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-20 px-6 max-w-4xl mx-auto text-center reveal">
        <span class="inline-block px-4 py-1.5 rounded-full bg-white/5 text-gray-400 text-[10px] font-bold tracking-[0.3em] mb-6 border border-white/10 uppercase">
            Official AI Collection
        </span>
        <h2 class="text-5xl md:text-7xl font-black leading-[1.05] mb-8 text-gradient italic tracking-tighter">
            구라가 말하고<br>AI가 그리다
        </h2>
        <p class="text-gray-500 text-sm md:text-lg font-light leading-relaxed max-w-xl mx-auto">
            시대를 관통하는 독설가 김구라의 팩트폭격.<br>
            가장 최근 발행된 에피소드부터 순차적으로 만나보세요.
        </p>
    </header>

    <main id="feed" class="max-w-xl md:max-w-2xl mx-auto px-6 pb-40 space-y-16 md:space-y-24">
        <div class="toon-card opacity-20">
            <div class="aspect-[4/5] bg-white/10 shimmer"></div>
            <div class="p-10 space-y-4">
                <div class="h-10 bg-white/10 w-3/4 rounded-2xl"></div>
                <div class="h-5 bg-white/10 w-full rounded-2xl"></div>
            </div>
        </div>
    </main>

    <footer class="py-20 border-t border-white/5 text-center">
        <p class="font-orbitron text-[10px] tracking-[0.5em] text-gray-700 uppercase">© GURA TOON STUDIO | NO-REPLY ZONE</p>
    </footer>

    <script>
        const SB_URL = "https://auhaxohbsnttmryesffe.supabase.co";
        const SB_KEY = "sb_publishable_wddiMfFQV6WeD0kpwl6n_w__Vrtx7Rl";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const UI = {
            feed: document.getElementById('feed')
        };

        // 갤러리 카드 렌더링
        function createGalleryCard(data, index) {
            const card = document.createElement('article');
            card.className = `toon-card reveal`;
            card.style.animationDelay = `${index * 0.1}s`;
            
            card.innerHTML = `
                <div class="relative overflow-hidden group">
                    <img src="${data.image_url}" class="w-full aspect-[4/5] object-cover transition-transform duration-1000 group-hover:scale-105">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#050507] via-transparent to-transparent opacity-80"></div>
                    <div class="absolute top-6 left-6">
                         <span class="px-3 py-1 bg-black/40 backdrop-blur-md text-[9px] font-bold tracking-widest text-gray-300 border border-white/10 rounded-full italic">NEW EPISODE</span>
                    </div>
                </div>
                <div class="p-8 md:p-12">
                    <h3 class="text-3xl md:text-4xl font-black mb-8 leading-tight italic tracking-tighter text-white">
                        ${data.title}
                    </h3>
                    <div class="relative">
                        <svg class="absolute -top-6 -left-2 text-purple-500/20 w-12 h-12" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 9.351-9.609v4.069c-2.715.021-3.918 1.857-3.918 4.72h4.099v8.211h-9.532zm-14.017 0v-7.391c0-5.704 3.748-9.57 9.355-9.609v4.069c-2.715.021-3.909 1.857-3.909 4.72h4.099v8.211h-9.545z"/></svg>
                        <p class="text-gray-300 text-lg md:text-xl leading-relaxed font-light font-serif-italic relative z-10">
                            ${data.content}
                        </p>
                    </div>
                    <div class="mt-10 pt-8 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[9px] font-mono text-gray-600 tracking-widest uppercase">Verified AI Art</span>
                        <div class="flex gap-1">
                            <div class="w-1 h-1 rounded-full bg-purple-500/40"></div>
                            <div class="w-1 h-1 rounded-full bg-purple-500/60"></div>
                            <div class="w-1 h-1 rounded-full bg-purple-500"></div>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        // DB에서 최신 데이터 가져오기
        async function fetchGallery() {
            try {
                const { data, error } = await _supabase
                    .from('episodes')
                    .select('*')
                    .order('created_at', { ascending: false });

                UI.feed.innerHTML = ''; // 스켈레톤 제거

                if (data && data.length > 0) {
                    data.forEach((item, index) => {
                        UI.feed.appendChild(createGalleryCard(item, index));
                    });
                } else {
                    UI.feed.innerHTML = '<div class="text-center py-20 text-gray-700 font-mono text-xs tracking-widest uppercase">Waiting for first release...</div>';
                }
            } catch (err) {
                console.error("DB Fetch Error:", err);
            }
        }

        window.onload = fetchGallery;
    </script>
</body>
</html>
