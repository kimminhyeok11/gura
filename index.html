<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gura Toon Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0a0a0c; color: #fff; }
        .toon-card { transition: transform 0.3s ease; }
        .toon-card:hover { transform: translateY(-8px); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="sticky top-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/5 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black font-orbitron italic tracking-tighter">GURA <span class="text-purple-500">READER</span></h1>
            <button onclick="loadEpisodes()" class="text-xs font-bold text-purple-400 hover:text-white transition-colors uppercase tracking-widest">Refresh</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 lg:p-12">
        <div id="episodeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Loading State -->
            <div class="col-span-full py-20 text-center opacity-30 animate-pulse">
                데이터를 불러오고 있습니다...
            </div>
        </div>
    </main>

    <!-- Detail Modal (Simulated) -->
    <div id="modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-white text-3xl">&times;</button>
        <div id="modalContent" class="max-w-4xl w-full max-h-[90vh] overflow-y-auto custom-scroll bg-zinc-900 rounded-3xl">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script>
        const SB_URL = "https://auhaxohbsnttmryesffe.supabase.co";
        const SB_KEY = "sb_publishable_wddiMfFQV6WeD0kpwl6n_w__Vrtx7Rl";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function loadEpisodes() {
            const grid = document.getElementById('episodeGrid');
            const { data, error } = await _supabase
                .from('episodes')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                grid.innerHTML = `<p class="text-red-500">에러: ${error.message}</p>`;
                return;
            }

            grid.innerHTML = data.map(ep => `
                <div class="toon-card glass rounded-2xl overflow-hidden cursor-pointer bg-zinc-900 border border-white/5 shadow-xl" onclick="openEpisode('${ep.id}')">
                    <div class="aspect-square bg-zinc-800">
                        <img src="${ep.image_url}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                    <div class="p-6">
                        <h3 class="text-lg font-black line-clamp-1 mb-2">${ep.title}</h3>
                        <p class="text-sm text-gray-500 line-clamp-2 italic">${ep.content}</p>
                    </div>
                </div>
            `).join('');
        }

        async function openEpisode(id) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            const { data: ep } = await _supabase.from('episodes').select('*').eq('id', id).single();
            const { data: comments } = await _supabase.from('comments').select('*').eq('episode_id', id).order('created_at', { ascending: false });

            content.innerHTML = `
                <div class="flex flex-col md:flex-row">
                    <div class="md:w-1/2">
                        <img src="${ep.image_url}" class="w-full sticky top-0">
                    </div>
                    <div class="md:w-1/2 p-8 md:p-12 bg-zinc-900">
                        <h2 class="text-3xl font-black mb-6">${ep.title}</h2>
                        <div class="bg-black/30 p-6 rounded-2xl border-l-4 border-purple-600 italic text-gray-300 leading-relaxed mb-10">
                            "${ep.content}"
                        </div>
                        
                        <div class="space-y-6">
                            <h4 class="text-sm font-bold uppercase tracking-widest text-purple-400">Comments</h4>
                            <div class="flex gap-2">
                                <input id="cmtInput" class="flex-grow bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-purple-500" placeholder="댓글을 입력하세요...">
                                <button onclick="postComment('${ep.id}')" class="bg-purple-600 px-4 py-2 rounded-lg text-sm font-bold">등록</button>
                            </div>
                            <div class="space-y-4 max-h-60 overflow-y-auto custom-scroll pr-2">
                                ${comments.length ? comments.map(c => `
                                    <div class="text-sm border-b border-white/5 pb-2">
                                        <span class="font-bold text-gray-400">${c.nickname}</span>
                                        <p class="text-gray-300 mt-1">${c.comment}</p>
                                    </div>
                                `).join('') : '<p class="text-xs text-gray-600">첫 댓글을 남겨보세요.</p>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function postComment(epId) {
            const input = document.getElementById('cmtInput');
            if (!input.value.trim()) return;

            const { error } = await _supabase.from('comments').insert([{
                episode_id: epId,
                comment: input.value,
                nickname: '익명 독자'
            }]);

            if (!error) {
                input.value = '';
                openEpisode(epId); // Refresh modal
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.onload = loadEpisodes;
    </script>
</body>
</html>
