<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>베이징 숙소 TOP4 – 실시간 인스타픽</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#faf7f2;margin:0;padding:24px}
h1{font-size:28px;text-align:center;margin:0 0 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;max-width:960px;margin:0 auto}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:14px}
.card h3{margin:0 0 6px;font-size:18px}
.card p{margin:0 0 10px;color:#666;font-size:14px}
.btn{display:inline-block;background:#2b2b2b;color:#fff;padding:8px 12px;border-radius:8px;text-decoration:none;font-size:14px}
</style>
</head>
<body>
<h1>베이징 숙소, 인스타가 뽑은 4곳</h1>
<div class="grid" id="list">불러오는 중...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://wsguyhtyfpdbfhbqebag.supabase.co';
const SUPA_KEY = 'sb_publishable_6gUnm_lbFF9XFnJY-D2Tcw_MaUCxFIN'; // 테스트 끝나면 꼭 교체!

const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

async function load(){
  const { data } = await supa.from('affiliates')
    .select('*').eq('type','hotel').order('engagement_score',{ascending:false}).limit(4);
  
  const list = document.getElementById('list');
  list.innerHTML = '';
  data.forEach(h => {
    const img = `${SUPA_URL}/storage/v1/object/public/images/${h.image_path}`;
    list.innerHTML += `
      <div class="card">
        <img src="${img}" alt="${h.name}" onerror="this.src='https://placehold.co/600x400?text=No+Image'">
        <div class="card-body">
          <h3>${h.name}</h3>
          <p>인스타 저장 ${h.engagement_score.toLocaleString()} · 출처 ${h.meta.source}</p>
          <a class="btn" href="${h.affiliate_url}" target="_blank">최저가 보기</a>
        </div>
      </div>`;
  });
}
load();
</script>
</body>
</html>
