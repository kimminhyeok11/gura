<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GURA TOON STUDIO v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Orbitron:wght@800&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --p-purple: #A78BFA; --p-indigo: #6366F1; --dark-bg: #030305; }
        body { 
            background-color: var(--dark-bg); 
            color: #F8FAFC; 
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 글래스모피즘 효과 */
        .glass { background: rgba(15, 15, 25, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* 커스텀 스크롤 */
        ::-webkit-scrollbar { width: 0px; } /* 모바일 환경을 위해 숨김 */

        /* 애니메이션 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-anim { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* 버튼 네온 효과 */
        .neon-btn {
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neon-btn:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(167, 139, 250, 0.5); }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <aside class="z-50 w-full md:w-[400px] shrink-0 glass sticky top-0 md:h-screen flex flex-col p-6 md:p-8 border-b md:border-r border-white/10">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-black font-orbitron italic tracking-tighter bg-gradient-to-r from-violet-400 to-indigo-400 bg-clip-text text-transparent">GURA STUDIO</h1>
                <div id="syncStatus" class="flex items-center gap-1.5 mt-1.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></div>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Core Offline</span>
                </div>
            </div>
            <button onclick="clearLogs()" class="p-2 rounded-full hover:bg-white/5 transition-colors text-gray-500">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
        </header>

        <div class="flex-grow flex flex-col mb-6">
            <span class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-3">System Log</span>
            <div id="logBox" class="flex-grow bg-black/40 rounded-2xl p-4 font-mono text-[11px] leading-relaxed overflow-y-auto max-h-[150px] md:max-h-none border border-white/5">
                <div class="text-violet-400/60">Ready to synthesize...</div>
            </div>
        </div>

        <div class="hidden md:block space-y-4">
            <div id="progressContainer" class="hidden animate-pulse">
                <div class="flex justify-between text-[11px] font-bold mb-2">
                    <span class="text-violet-400" id="progressText">PROCESSING</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-to-r from-violet-500 to-indigo-500 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            <button id="genBtn" class="neon-btn w-full py-5 rounded-2xl bg-gradient-to-br from-violet-600 to-indigo-700 text-white font-black text-sm tracking-tight flex items-center justify-center gap-3">
                <span class="text-xl">⚡</span>
                <span>에피소드 발행하기</span>
            </button>
        </div>
    </aside>

    <main class="flex-grow relative pb-32 md:pb-12">
        <div id="viewport" class="max-w-2xl mx-auto py-8 md:py-16 px-5 space-y-12">
            <div id="emptyState" class="py-20 flex flex-col items-center opacity-40">
                <div class="w-20 h-20 rounded-full border-2 border-dashed border-white/20 flex items-center justify-center mb-6">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <p class="text-sm font-light tracking-widest uppercase">Select 'Generate' to Start</p>
            </div>
        </div>
    </main>

    <div class="md:hidden fixed bottom-0 left-0 w-full p-5 glass z-50 rounded-t-[32px] border-t border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <div id="mProgressContainer" class="hidden mb-4">
             <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                <div id="mProgressBar" class="h-full bg-violet-500 transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>
        <button id="mGenBtn" class="neon-btn w-full py-4 rounded-2xl bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-black flex items-center justify-center gap-3">
            <span class="text-lg">⚡</span>
            <span>새 에피소드 제작</span>
        </button>
    </div>

    <script>
        // --- 데이터베이스 & API 설정 ---
        const SB_URL = "https://auhaxohbsnttmryesffe.supabase.co";
        const SB_KEY = "sb_publishable_wddiMfFQV6WeD0kpwl6n_w__Vrtx7Rl";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const UI = {
            logs: document.getElementById('logBox'),
            viewport: document.getElementById('viewport'),
            status: document.getElementById('syncStatus'),
            empty: document.getElementById('emptyState'),
            // PC UI
            btn: document.getElementById('genBtn'),
            bar: document.getElementById('progressBar'),
            pCont: document.getElementById('progressContainer'),
            pText: document.getElementById('progressText'),
            pPerc: document.getElementById('progressPercent'),
            // 모바일 전용 UI
            mBtn: document.getElementById('mGenBtn'),
            mBar: document.getElementById('mProgressBar'),
            mCont: document.getElementById('mProgressContainer')
        };

        function addLog(msg, type = 'info') {
            const div = document.createElement('div');
            const colors = { info: 'text-violet-300/70', success: 'text-emerald-400', error: 'text-rose-400' };
            div.className = `mb-1 ${colors[type] || colors.info}`;
            div.innerHTML = `<span class="opacity-30 mr-2">></span>${msg}`;
            UI.logs.appendChild(div);
            UI.logs.scrollTop = UI.logs.scrollHeight;
        }

        function clearLogs() { UI.logs.innerHTML = '<div class="text-violet-400/60 italic text-[10px]">Log cleared. Waiting for command...</div>'; }

        function setProgress(val, text) {
            [UI.bar, UI.mBar].forEach(b => b.style.width = `${val}%`);
            [UI.pCont, UI.mCont].forEach(c => c.classList.remove('hidden'));
            if(text) UI.pText.innerText = text.toUpperCase();
            UI.pPerc.innerText = `${val}%`;
        }

        async function startProcess() {
            [UI.btn, UI.mBtn].forEach(b => b.disabled = true);
            setProgress(10, "Story Design");
            addLog("Brainstorming narrative...", "info");

            try {
                // 시뮬레이션 지연 (실제 API 호출 시 교체)
                await new Promise(r => setTimeout(r, 1500));
                
                const mockData = {
                    title: "지하철 2호선 코인 전사들",
                    content: "야, 얼굴이 왜 그렇게 퍼렇게 질렸어? 업비트 파란불이 네 얼굴에 반사된 거야? 정신 차려!",
                    prompt: "Korean comedian Gura Kim yelling at a crying man on a subway, anime style"
                };

                setProgress(60, "Art Generation");
                addLog("Drawing illustrations with AI...", "info");
                
                await new Promise(r => setTimeout(r, 2000));
                const mockImg = `https://picsum.photos/seed/${Date.now()}/800/1000`;

                renderFinal(mockData, mockImg);
                setProgress(100, "Completed");
                addLog("New toon has been deployed.", "success");

            } catch (err) {
                addLog(err.message, "error");
            } finally {
                [UI.btn, UI.mBtn].forEach(b => b.disabled = false);
                setTimeout(() => [UI.pCont, UI.mCont].forEach(c => c.classList.add('hidden')), 3000);
            }
        }

        function renderFinal(project, url) {
            if(UI.empty) UI.empty.remove();

            const card = document.createElement('div');
            card.className = "card-anim glass rounded-[2.5rem] overflow-hidden shadow-2xl group";
            card.innerHTML = `
                <div class="relative overflow-hidden">
                    <img src="${url}" class="w-full aspect-[4/5] object-cover transition-transform duration-1000 group-hover:scale-105">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#030305] via-transparent to-transparent opacity-80"></div>
                    <div class="absolute bottom-6 left-8">
                        <span class="px-3 py-1 bg-violet-500 text-white text-[10px] font-black tracking-widest rounded-full shadow-lg">EPISODE #NEW</span>
                    </div>
                </div>
                <div class="p-8 md:p-10 space-y-6">
                    <h2 class="text-3xl md:text-4xl font-black tracking-tighter italic leading-tight uppercase font-orbitron">
                        ${project.title}
                    </h2>
                    <div class="relative">
                        <div class="absolute -left-4 top-0 w-1 h-full bg-violet-500 rounded-full opacity-50"></div>
                        <p class="text-gray-300 text-lg md:text-xl leading-relaxed italic font-light">
                            "${project.content}"
                        </p>
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t border-white/5">
                        <span class="text-[10px] font-mono text-gray-600">RENDERED BY GURA-CORE v6.0</span>
                        <div class="flex gap-2">
                            <div class="w-2 h-2 rounded-full bg-violet-500/30"></div>
                            <div class="w-2 h-2 rounded-full bg-violet-500/60"></div>
                        </div>
                    </div>
                </div>
            `;
            
            UI.viewport.prepend(card);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        [UI.btn, UI.mBtn].forEach(b => b.addEventListener('click', startProcess));

        window.onload = async () => {
            const { error } = await _supabase.from('episodes').select('id').limit(1);
            if (!error) {
                UI.status.innerHTML = `
                    <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div>
                    <span class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest">Core Online</span>
                `;
                addLog("Database handshake successful.", "success");
            }
        };
    </script>
</body>
</html>
