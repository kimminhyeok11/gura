<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GURA TOON | 김구라의 독설 유머 시리즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root { --brand-yellow: #facc15; --brand-black: #050505; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--brand-black); color: white; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .gradient-text { background: linear-gradient(135deg, #facc15 0%, #eab308 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .ep-card { transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .ep-card:active { transform: scale(0.97); opacity: 0.8; }
        #loader { transition: opacity 0.8s ease-in-out; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .text-shadow-lg { text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <!-- Intro Loader -->
    <div id="loader" class="fixed inset-0 z-[1000] bg-[#050505] flex flex-col items-center justify-center">
        <h1 id="loader-logo" class="text-4xl font-black italic tracking-tighter opacity-0">GURA TOON</h1>
        <div id="loader-bar" class="w-12 h-[1px] bg-yellow-400 mt-4 scale-x-0"></div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-[#050505]">
        
        <!-- Main Header -->
        <header id="main-header" class="fixed top-0 max-w-md w-full z-50 px-6 py-5 flex justify-between items-center transition-all duration-300">
            <span class="text-xl font-black italic tracking-tighter gradient-text">GURA TOON</span>
            <div class="flex gap-3">
                <div id="online-indicator" class="flex items-center gap-1.5 px-3 py-1.5 glass rounded-full text-[10px] font-bold text-gray-400">
                    <span class="w-1.5 h-1.5 bg-gray-500 rounded-full"></span> OFFLINE
                </div>
            </div>
        </header>

        <!-- Hero Section -->
        <section class="relative pt-32 pb-12 px-6 overflow-hidden">
            <div class="relative z-10">
                <p class="text-yellow-400 font-bold text-[10px] tracking-[0.2em] uppercase mb-3 hero-fade opacity-0">Premium Satire</p>
                <h2 class="text-5xl font-black leading-[1.1] tracking-tight mb-6 hero-fade opacity-0">
                    에이~ 그건 <br/><span class="gradient-text italic">아니지!</span>
                </h2>
                <p class="text-white/50 text-sm leading-relaxed max-w-[280px] hero-fade opacity-0">
                    AI가 실시간으로 생성하는 김구라의 <br/>촌철살인 독설 에피소드를 만나보세요.
                </p>
            </div>
            <div class="absolute -right-20 top-10 w-64 h-64 bg-yellow-400/5 blur-[80px] rounded-full"></div>
        </section>

        <!-- Content Area -->
        <section id="content-area" class="px-6 pb-32">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-lg font-bold flex items-center gap-2">
                    최신 독설 피드 <span id="live-dot" class="w-1.5 h-1.5 bg-yellow-400 rounded-full hidden animate-pulse"></span>
                </h3>
                <span id="ep-count" class="text-[10px] text-white/30 font-bold tracking-widest uppercase">0 EPISODES</span>
            </div>
            
            <div id="episode-grid" class="space-y-8">
                <!-- Skeleton Loader -->
                <div class="space-y-6">
                    <div class="h-64 glass rounded-[2.5rem] animate-pulse"></div>
                    <div class="h-64 glass rounded-[2.5rem] animate-pulse"></div>
                </div>
            </div>
        </section>

        <!-- Detail Viewer (Full Screen) -->
        <div id="detail-view" class="fixed inset-0 z-[100] bg-[#050505] translate-y-full overflow-y-auto no-scrollbar">
            <div id="detail-dynamic-content"></div>
        </div>

        <!-- Floating Nav -->
        <nav class="fixed bottom-6 left-0 right-0 z-50 px-6">
            <div class="max-w-xs mx-auto glass rounded-full py-4 px-8 flex justify-around items-center border border-white/10 shadow-2xl backdrop-blur-3xl">
                <button class="text-yellow-400"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
                <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="text-white/20"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7"/></svg></button>
            </div>
        </nav>
    </div>

    <script>
        const SUPABASE_URL = "https://auhaxohbsnttmryesffe.supabase.co";
        const SUPABASE_KEY = "sb_publishable_wddiMfFQV6WeD0kpwl6n_w__Vrtx7Rl";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let cachedEpisodes = [];

        // 1. 초기 애니메이션 및 실행
        window.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();
            tl.to("#loader-logo", { opacity: 1, duration: 1, ease: "power2.out" })
              .to("#loader-bar", { scaleX: 1, duration: 0.8, ease: "power2.inOut" }, "-=0.5")
              .to("#loader", { opacity: 0, pointerEvents: 'none', duration: 0.8, delay: 0.5 })
              .from(".hero-fade", { opacity: 0, y: 20, stagger: 0.15, duration: 0.8, ease: "power3.out" }, "-=0.3");
            
            initSupabase();
        });

        // 2. Supabase 초기화 및 실시간 구독
        async function initSupabase() {
            // 초기 로드
            await fetchEpisodes();

            // 상태 표시 업데이트
            const indicator = document.getElementById('online-indicator');
            indicator.innerHTML = `<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> LIVE SYNC`;
            indicator.classList.replace('text-gray-400', 'text-green-500');
            document.getElementById('live-dot').classList.remove('hidden');

            // 리얼타임 구독 (에피소드 테이블 감시)
            _supabase
                .channel('schema-db-changes')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'episodes' }, payload => {
                    console.log('New Episode Detected:', payload.new);
                    fetchEpisodes(); // 새 에피소드 감지 시 목록 갱신
                })
                .subscribe();
        }

        // 3. 에피소드 데이터 가져오기
        async function fetchEpisodes() {
            const { data, error } = await _supabase
                .from('episodes')
                .select('*')
                .order('created_at', { ascending: false });

            const grid = document.getElementById('episode-grid');
            if (error || !data || data.length === 0) {
                grid.innerHTML = '<div class="py-20 text-center opacity-30 text-xs font-bold tracking-widest uppercase">No episodes yet.</div>';
                return;
            }

            cachedEpisodes = data;
            document.getElementById('ep-count').innerText = `${data.length} EPISODES`;

            grid.innerHTML = data.map((ep, idx) => {
                // 이미지 없을 때 처리: 검은 배경에 텍스트 중심
                const hasImage = ep.image_url && !ep.image_url.includes('placehold');
                
                return `
                    <div onclick="openDetail('${ep.id}')" class="ep-card group relative cursor-pointer active:scale-95 transition-all duration-500">
                        <div class="relative aspect-[4/5] rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/5 bg-[#0a0a0a]">
                            ${hasImage ? 
                                `<img src="${ep.image_url}" class="w-full h-full object-cover grayscale-[0.2] transition-all duration-700 group-hover:scale-110">` :
                                `<div class="w-full h-full flex items-center justify-center p-10 text-center opacity-20">
                                    <svg width="40" height="40" fill="white" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z"/></svg>
                                </div>`
                            }
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                            <div class="absolute bottom-8 left-8 right-8">
                                <span class="text-yellow-400 font-black text-[9px] tracking-[0.2em] uppercase mb-2 block">EP. ${data.length - idx}</span>
                                <h4 class="text-2xl font-black leading-tight tracking-tight text-white text-shadow-lg">${ep.title}</h4>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 4. 상세 보기 로직
        function openDetail(id) {
            const ep = cachedEpisodes.find(e => e.id === id);
            const container = document.getElementById('detail-dynamic-content');
            const hasImage = ep.image_url && !ep.image_url.includes('placehold');
            
            container.innerHTML = `
                <div class="relative min-h-screen bg-[#050505]">
                    <button onclick="closeDetail()" class="fixed top-6 left-6 z-[110] w-12 h-12 glass rounded-full flex items-center justify-center text-white active:scale-90 transition-transform">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"></path></svg>
                    </button>
                    
                    <div class="w-full aspect-[4/5] overflow-hidden bg-[#0a0a0a]">
                        ${hasImage ? 
                            `<img src="${ep.image_url}" class="w-full h-full object-cover">` : 
                            `<div class="w-full h-full flex items-center justify-center opacity-10 italic font-black">NO IMAGE</div>`
                        }
                    </div>
                    
                    <div class="relative -mt-16 bg-[#050505] rounded-t-[3rem] p-8 pt-12">
                        <div class="w-10 h-1 bg-white/10 rounded-full mx-auto mb-10"></div>
                        <h2 class="text-3xl font-black mb-8 leading-tight tracking-tighter">${ep.title}</h2>
                        <div class="text-[17px] leading-[1.8] text-white/70 whitespace-pre-wrap font-medium border-l-2 border-yellow-400 pl-6 mb-20">
                            ${ep.content}
                        </div>
                        
                        <div class="pb-32 pt-10 border-t border-white/5">
                            <div class="flex items-center justify-between mb-8">
                                <h5 class="font-bold text-sm tracking-widest text-white/40 uppercase">Community Reaction</h5>
                            </div>
                            <div id="comment-area" class="space-y-4 mb-8"></div>
                            <div class="flex gap-2 p-2 glass rounded-[2rem]">
                                <input id="c-input" placeholder="독설 한마디 남겨보세요..." class="flex-1 bg-transparent px-4 py-2 text-sm outline-none">
                                <button onclick="postComment('${ep.id}')" class="bg-yellow-400 text-black px-6 py-3 rounded-full font-black text-xs active:scale-95 transition-all">전달</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            gsap.to("#detail-view", { yPercent: -100, duration: 0.6, ease: "power4.out" });
            loadComments(ep.id);
        }

        function closeDetail() {
            gsap.to("#detail-view", { yPercent: 100, duration: 0.5, ease: "power3.in" });
        }

        async function loadComments(id) {
            const { data } = await _supabase.from('comments').select('*').eq('episode_id', id).order('created_at', { ascending: true });
            const area = document.getElementById('comment-area');
            area.innerHTML = (data || []).map(c => `
                <div class="p-5 glass rounded-3xl animate-in slide-in-from-bottom-2 duration-500">
                    <p class="text-sm text-white/80 leading-relaxed font-medium">${c.comment}</p>
                </div>
            `).join('') || '<p class="opacity-20 text-[10px] py-10 text-center font-bold tracking-widest">NO REPLIES YET</p>';
        }

        async function postComment(id) {
            const input = document.getElementById('c-input');
            if (!input.value.trim()) return;
            const { error } = await _supabase.from('comments').insert([{ episode_id: id, comment: input.value }]);
            if (error) { console.error(error); return; }
            input.value = '';
            loadComments(id);
        }

        // Header Scroll Interaction
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 30) {
                header.classList.add('bg-[#050505]/80', 'backdrop-blur-xl', 'py-3');
            } else {
                header.classList.remove('bg-[#050505]/80', 'backdrop-blur-xl', 'py-3');
            }
        });
    </script>
</body>
</html>
