    <div id="custom-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/95 text-white text-[11px] font-bold px-5 py-3 rounded-full shadow-xl z-50 transition-all duration-300 opacity-0 translate-y-4 pointer-events-none whitespace-nowrap">

    <!-- SDK & 비즈니스 로직 제어 -->
    <script>
        const SUPABASE_URL = 'https://wsguyhtyfpdbfhbqebag.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_6gUnm_lbFF9XFnJY-D2Tcw_MaUCxFIN';
        
        let supabaseClient;
        let productsData = [];
        let filteredProducts = [];
        let currentCategory = '전체';
        let isAdminSessionActive = false;

        // Custom Toast System (샌드박스 환경 대응용 커스텀 경고창)
        function showToast(message) {
            const toast = document.getElementById('custom-toast');
            toast.innerText = message;
            toast.classList.add('toast-active');
            
            setTimeout(() => {
                toast.classList.remove('toast-active');
            }, 2500);
        }

        // 앱 초기화 로드
        function initApp() {
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                checkActiveSession();
                fetchProducts();
            } catch (err) {
                console.error("SDK 초기화 에러:", err);
            }
        }

        // 실시간 가상 로컬 세션 확인 및 UI 정합성 매칭
        function checkActiveSession() {
            const localSession = localStorage.getItem('virtual_admin_login');
            if (localSession === 'salad20c_active') {
                isAdminSessionActive = true;
                toggleAdminInterface(true);
            } else {
                isAdminSessionActive = false;
                toggleAdminInterface(false);
            }
        }

        function toggleAdminInterface(isLoggedIn) {
            const loginView = document.getElementById('admin-login-view');
            const actionView = document.getElementById('admin-action-view');
            if (isLoggedIn) {
                loginView.classList.add('hidden');
                actionView.classList.remove('hidden');
            } else {
                loginView.classList.remove('hidden');
                actionView.classList.add('hidden');
            }
        }

        // Supabase 가입 단계 생략 및 다이렉트 이중 보안 검증 우회 구현 완료
        async function performAdminLogin() {
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;

            if (!password) {
                showToast("⚠️ 비밀번호를 입력해 주세요.");
                return;
            }

            const loginBtn = document.querySelector("#admin-login-view button");
            loginBtn.disabled = true;
            loginBtn.innerText = "로그인 중...";

            try {
                // 이메일 미인증 이슈가 있어도 완벽 우회되도록 자격증명 직통 매치 처리
                if (email === "salad20c@gmail.com" && password === "cxx1212") {
                    localStorage.setItem('virtual_admin_login', 'salad20c_active');
                    isAdminSessionActive = true;
                    
                    // 수파베이스 쓰기 작업을 위해 익명 세션 먼저 확보해 둡니다.
                    await supabaseClient.auth.signInAnonymously();
                    
                    showToast("🔓 성공적으로 인증되었습니다!");
                    toggleAdminInterface(true);
                } else {
                    showToast("❌ 비밀번호가 다릅니다. 다시 확인해 주세요.");
                }
            } catch (err) {
                showToast("❌ 로그인 오류: " + err.message);
                console.error(err);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerText = "로그인";
            }
        }

        async function performLogout() {
            localStorage.removeItem('virtual_admin_login');
            isAdminSessionActive = false;
            await supabaseClient.auth.signOut();
            showToast("🔒 안전하게 로그아웃 되었습니다.");
            toggleAdminInterface(false);
        }

        // Portal Handler
        function openAdminPortal() {
            document.getElementById('admin-modal').classList.remove('hidden');
        }

        function closeAdminPortal() {
            document.getElementById('admin-modal').classList.add('hidden');
        }

        // 브라우저 단 WebP 이미지 가속 트랜스파일러 및 대역폭 최적화
        function processAndCompressToWebP(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // 크리에이터 고유의 비율을 완벽히 존중하며 모바일 최적 해상도로 압축 가공
                        const BOUNDING_LIMIT = 1000;
                        let width = img.width;
                        let height = img.height;

                        if (width > BOUNDING_LIMIT || height > BOUNDING_LIMIT) {
                            if (width > height) {
                                height = Math.round((height * BOUNDING_LIMIT) / width);
                                width = BOUNDING_LIMIT;
                            } else {
                                width = Math.round((width * BOUNDING_LIMIT) / height);
                                height = BOUNDING_LIMIT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            if (blob) resolve(blob);
                            else reject(new Error("WebP 최적화 컨버팅 실패"));
                        }, 'image/webp', 0.85); // 디테일 왜곡을 차단하는 85% 선명도 유지 매개변수 적용
                    };
                };
                reader.onerror = (error) => reject(error);
            });
        }

        // 인스타 친화적 상세 설명 자동 생성 어시스턴트
        function autoGenerateMetaText(title, price, category, origDesc) {
            if (origDesc && origDesc.trim().length > 3) {
                return origDesc;
            }
            const hashtags = `#데일리룩 #여성패션 #릴스코디 #인스타마켓 #@ilovemom_2026`;
            return `🛍️ 크리에이터 @ilovemom_2026 추천 코디템!\n\n인스타 릴스 영상 속에서 다들 궁금해하셨던 바로 그 [${category}] 라인 제품입니다.\n실제 입었을 때 핏감이 훨씬 부드럽고 자연스러운 라인감을 살려줘서 데일리웨어로 제격이에요.\n\n✔️ 추천 코디 포인트: 깔끔하고 트렌디한 디자인\n✔️ 가격대 혜택 정보: 인스타 전용 최저가 ${price} 적용 중!\n\n조기 품절되기 전에 아래 바로가기 버튼을 통해 혜택을 챙겨보세요!\n\n${hashtags}`;
        }

        // 상품 등록 트랜잭션 핸들러
        async function registerProduct() {
            if (!isAdminSessionActive) {
                showToast("⚠️ 관리자 권한이 만료되었습니다. 다시 로그인해 주세요.");
                return;
            }

            const fileInput = document.getElementById('product-img');
            const category = document.getElementById('product-cat').value;
            const price = document.getElementById('product-price').value.trim() || "최저가 확인";
            const title = document.getElementById('product-title').value.trim();
            const link = document.getElementById('product-link').value.trim();
            const origPrice = document.getElementById('product-orig-price').value.trim();
            const rawDesc = document.getElementById('product-desc').value.trim();
            const submitBtn = document.getElementById('admin-submit-btn');

            if (!fileInput.files[0] || !title || !link) {
                showToast("⚠️ 이미지, 상품명, 링크는 무조건 필수 항목입니다.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                <span>업로드 중...</span>
            `;

            try {
                // 이미지 WebP 가공 프로세서 연동
                const rawFile = fileInput.files[0];
                const optimizedWebpBlob = await processAndCompressToWebP(rawFile);
                const uniqueId = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}`;
                const filePath = `item_${uniqueId}.webp`;

                // Storage 업로드 실행
                const { error: uploadError } = await supabaseClient.storage
                    .from('images')
                    .upload(filePath, optimizedWebpBlob, {
                        contentType: 'image/webp'
                    });

                if (uploadError) throw uploadError;

                const { data: urlData } = supabaseClient.storage
                    .from('images')
                    .getPublicUrl(filePath);

                const cdnImageUrl = urlData.publicUrl;

                // 자동 코디 팁 작성 어시스턴트 매핑
                const processedDescription = autoGenerateMetaText(title, price, category, rawDesc);
                
                // 할인율 데코레이션을 위한 오리지널가 역산 적용 (정상가 비어있을 시 약 1.25배 가이드 자동 산출)
                let finalOriginalPrice = origPrice;
                if (!origPrice && price !== "최저가 확인") {
                    const cleanPrice = parseInt(price.replace(/[^0-9]/g, ''));
                    if (!isNaN(cleanPrice)) {
                        finalOriginalPrice = Math.round((cleanPrice * 1.25) / 100) * 100;
                        finalOriginalPrice = finalOriginalPrice.toLocaleString('ko-KR') + "원";
                    }
                }

                // Supabase Database Insert
                const { error: dbError } = await supabaseClient
                    .from('products')
                    .insert([{
                        title: title,
                        link: link,
                        price: price,
                        original_price: finalOriginalPrice || null,
                        description: processedDescription,
                        category: category,
                        image_url: cdnImageUrl
                    }]);

                if (dbError) throw dbError;

                showToast("🎉 새로운 쇼핑 아이템이 정상 배포되었습니다!");
                
                // Form 데이터 완전 초기화
                fileInput.value = '';
                document.getElementById('product-price').value = '';
                document.getElementById('product-title').value = '';
                document.getElementById('product-link').value = '';
                document.getElementById('product-orig-price').value = '';
                document.getElementById('product-desc').value = '';
                
                closeAdminPortal();
                fetchProducts();
            } catch (err) {
                showToast("⚠️ 업로드 실패: " + err.message);
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    배포 완료하기
                `;
            }
        }

        // Database Fetch
        async function fetchProducts() {
            const grid = document.getElementById('product-grid');
            try {
                const { data, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                productsData = data || [];
                applyFilters();
            } catch (err) {
                grid.innerHTML = `<div class="col-span-2 text-center py-16 text-xs text-red-400 font-medium font-semibold">피드 수신 중단: ${err.message}</div>`;
            }
        }

        function setCategory(categoryName) {
            currentCategory = categoryName;
            
            document.querySelectorAll('.category-tab').forEach(btn => {
                if (btn.innerText === categoryName || (categoryName === '전체' && btn.innerText === '전체')) {
                    btn.className = "category-tab active px-4 py-1.5 rounded-full text-xs font-extrabold bg-slate-900 text-white shadow-sm whitespace-nowrap transition-all";
                } else {
                    btn.className = "category-tab px-4 py-1.5 rounded-full text-xs font-medium bg-white text-slate-600 border border-slate-200/60 whitespace-nowrap transition-all";
                }
            });

            applyFilters();
        }

        function handleSearch() {
            applyFilters();
        }

        function applyFilters() {
            const searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            
            filteredProducts = productsData.filter(p => {
                const matchesCategory = currentCategory === '전체' || p.category === currentCategory;
                const matchesSearch = !searchKeyword || 
                                      p.title.toLowerCase().includes(searchKeyword) || 
                                      (p.description && p.description.toLowerCase().includes(searchKeyword));
                return matchesCategory && matchesSearch;
            });

            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            
            if (filteredProducts.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 text-center py-20 bg-white rounded-3xl border border-slate-100 p-6 shadow-sm">
                        <p class="text-xs font-bold text-slate-400">등록된 어필리에이트 아이템이 없습니다.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredProducts.map(p => {
                let discountBadge = '';
                if (p.original_price && p.price) {
                    discountBadge = `<span class="bg-rose-500 text-white text-[8px] font-black px-1.5 py-0.5 rounded-md">HOT</span>`;
                }

                return `
                    <div onclick='openProductDetail(${JSON.stringify(p).replace(/'/g, "&apos;")})' class="bg-white rounded-2xl overflow-hidden border border-slate-100 hover:shadow-lg transition-all duration-300 flex flex-col justify-between cursor-pointer group">
                        <div class="relative overflow-hidden bg-slate-50">
                            <img src="${p.image_url}" alt="${p.title}" class="w-full aspect-[3/4] object-cover" loading="lazy">
                            <div class="absolute top-2.5 right-2.5">
                                ${discountBadge}
                            </div>
                        </div>

                        <div class="p-3.5 flex flex-col justify-between flex-grow">
                            <div class="space-y-1 mb-2.5">
                                <span class="text-[9px] font-extrabold text-slate-400 uppercase tracking-wider">${p.category}</span>
                                <h3 class="text-xs font-bold text-slate-800 line-clamp-2 leading-relaxed h-8 group-hover:text-slate-950 transition-colors">
                                    ${p.title}
                                </h3>
                            </div>

                            <div class="space-y-2">
                                <div class="flex items-baseline justify-between">
                                    <span class="text-xs font-black text-slate-950">${p.price}</span>
                                    ${p.original_price ? `<span class="text-[10px] text-slate-400 line-through font-medium">${p.original_price}</span>` : ''}
                                </div>
                                
                                <div class="w-full py-2.5 bg-slate-50 group-hover:bg-slate-950 group-hover:text-white rounded-xl text-[9px] font-black text-slate-800 text-center transition-all duration-300 flex items-center justify-center gap-1">
                                    <span>자세히 보기</span>
                                    <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 바텀시트 제어 영역
        function openProductDetail(product) {
            document.getElementById('detail-image').src = product.image_url;
            document.getElementById('detail-category').innerText = product.category;
            document.getElementById('detail-title').innerText = product.title;
            document.getElementById('detail-price').innerText = product.price;
            
            if (product.original_price) {
                document.getElementById('detail-original-price').innerText = product.original_price;
                document.getElementById('detail-original-price').classList.remove('hidden');
            } else {
                document.getElementById('detail-original-price').classList.add('hidden');
            }

            document.getElementById('detail-description').innerText = product.description;

            // 아웃링크 매핑
            document.getElementById('detail-buy-link').href = product.link;

            const overlay = document.getElementById('bottom-sheet-overlay');
            const sheet = document.getElementById('bottom-sheet');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.style.opacity = '1';
                sheet.classList.add('open');
            }, 50);
        }

        function closeProductDetail() {
            const overlay = document.getElementById('bottom-sheet-overlay');
            const sheet = document.getElementById('bottom-sheet');
            
            sheet.classList.remove('open');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
        }

        window.onload = initApp;
    </script>
</body>
</html>
